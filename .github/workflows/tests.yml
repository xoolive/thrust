name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  rust-core-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/target
          key: rust-build-${{ runner.os }}-${{ github.sha }}

      - name: Build shared Rust core artifacts
        run: cargo build -p traffic-thrust -p thrust-wasm

      - name: Save Rust build cache
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/target
          key: rust-build-${{ runner.os }}-${{ github.sha }}

  rust-lint:
    runs-on: ubuntu-latest
    needs: [rust-core-build]
    env:
      FAA_TEST_DATA_DIR: ~/.cache/thrust-faa
      FAA_NASR_AIRAC: "2508"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/target
          key: rust-build-${{ runner.os }}-${{ github.sha }}

      - name: Rust formatting
        run: cargo fmt --all --check

      - name: Rust linting
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    needs: [rust-core-build]
    env:
      FAA_TEST_DATA_DIR: ~/.cache/thrust-faa
      FAA_NASR_AIRAC: "2508"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/target
          key: rust-build-${{ runner.os }}-${{ github.sha }}

      - name: Restore FAA test data cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/thrust-faa
          key: faa-data-${{ runner.os }}-v1

      - name: Rust tests
        run: cargo test --workspace --all-targets

  python-lint:
    runs-on: ubuntu-latest
    needs: [rust-core-build]
    env:
      FAA_TEST_DATA_DIR: ~/.cache/thrust-faa
      FAA_NASR_AIRAC: "2508"
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Restore Rust build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/target
          key: rust-build-${{ runner.os }}-${{ github.sha }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Python formatting
        run: uv run ruff format --check .

      - name: Python linting
        run: uv run ruff check .

      - name: Python typing
        run: uv run ty check thrust

  python-test:
    runs-on: ubuntu-latest
    needs: [rust-core-build]
    env:
      FAA_TEST_DATA_DIR: ~/.cache/thrust-faa
      FAA_NASR_AIRAC: "2508"
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Restore Rust build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/target
          key: rust-build-${{ runner.os }}-${{ github.sha }}

      - name: Restore FAA test data cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/thrust-faa
          key: faa-data-${{ runner.os }}-v1

      - name: Install dependencies
        run: uv sync --dev

      - name: Python tests
        run: uv run pytest --ignore=tests/test_kalman.py --ignore=tests/test_intervals.py

  wasm-lint:
    runs-on: ubuntu-latest
    needs: [rust-core-build]
    env:
      FAA_TEST_DATA_DIR: ~/.cache/thrust-faa
      FAA_NASR_AIRAC: "2508"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/target
          key: rust-build-${{ runner.os }}-${{ github.sha }}

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install TS lint dependencies
        run: npm install
        working-directory: crates/thrust-wasm/tests-ts

      - name: WASM formatting
        run: cargo fmt --all --check

      - name: WASM linting
        run: cargo clippy -p thrust-wasm --all-targets -- -D warnings

      - name: TS linting
        run: npm run lint
        working-directory: crates/thrust-wasm/tests-ts

      - name: TS typecheck
        run: npm run typecheck
        working-directory: crates/thrust-wasm/tests-ts

  wasm-test:
    runs-on: ubuntu-latest
    needs: [rust-core-build]
    env:
      FAA_TEST_DATA_DIR: ~/.cache/thrust-faa
      FAA_NASR_AIRAC: "2508"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Restore FAA test data cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/thrust-faa
          key: faa-data-${{ runner.os }}-v1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/target
          key: rust-build-${{ runner.os }}-${{ github.sha }}

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: WASM tests
        run: cargo test -p thrust-wasm --all-targets

      - name: Build WASM wrapper
        run: wasm-pack build crates/thrust-wasm --target web --release --no-opt

      - name: Install TS test dependencies
        run: npm install
        working-directory: crates/thrust-wasm/tests-ts

      - name: Run TS tests
        run: npm test
        working-directory: crates/thrust-wasm/tests-ts
