name: npm

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wasm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          set -euo pipefail
          WASM_PACK_VERSION="0.14.0"
          URL="https://github.com/rustwasm/wasm-pack/releases/download/v${WASM_PACK_VERSION}/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          TMP_DIR="$(mktemp -d)"
          curl -sSL "$URL" -o "$TMP_DIR/wasm-pack.tar.gz"
          tar -xzf "$TMP_DIR/wasm-pack.tar.gz" -C "$TMP_DIR"
          install "$TMP_DIR/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack" "$HOME/.cargo/bin/wasm-pack"
          wasm-pack --version

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Build npm package outputs
        working-directory: crates/thrust-wasm
        run: just pkg

      - name: Show npm package contents
        working-directory: crates/thrust-wasm/pkg
        run: npm pack --dry-run

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: crates/thrust-wasm/pkg
        env:
          NPM_CONFIG_PROVENANCE: true
        run: npm publish --access public
